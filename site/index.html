<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Class of 2005</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Class of 2005</h1>
      <p class="subtitle">Freshman year interactive story</p>

      <section id="story" class="panel"></section>
      <section id="choices" class="choices"></section>
    </main>

    <aside
      id="stats-hud"
      class="stats-hud"
      aria-live="polite"
      aria-label="Character stats"
      hidden
    >
      <div class="stats-hud__header">
        <button
          type="button"
          id="stats-hud-toggle"
          class="stats-hud__toggle"
          aria-expanded="true"
          aria-controls="stats-hud-content"
        >
          <span class="stats-hud__title">Stats</span>
          <span class="stats-hud__caret" aria-hidden="true"></span>
        </button>
      </div>
      <div id="stats-hud-content" class="stats-hud__content"></div>
    </aside>

    <script src="./vendor/ink.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
