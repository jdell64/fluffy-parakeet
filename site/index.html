<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Class of 2005</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <h1 class="site-header__title">Class of 2005</h1>
        <p class="site-header__subtitle">
          Freshman year interactive story
        </p>
      </div>
    </header>

    <main class="container">
      <section id="story" class="panel"></section>
      <section id="choices" class="choices"></section>
    </main>

    <aside
      id="stats-hud"
      class="stats-hud"
      aria-live="polite"
      aria-label="Character stats"
      hidden
    >
      <div class="stats-hud__header">
        <button
          type="button"
          id="stats-hud-toggle"
          class="stats-hud__toggle"
          aria-expanded="true"
          aria-controls="stats-hud-content"
        >
          <span class="stats-hud__title">Stats</span>
          <span class="stats-hud__caret" aria-hidden="true"></span>
        </button>
      </div>
      <div id="stats-hud-content" class="stats-hud__content"></div>
    </aside>

    <aside
      id="date-hud"
      class="date-hud"
      aria-live="polite"
      aria-label="In-story date"
      hidden
    >
      <div class="date-hud__label">Story date</div>
      <div id="date-hud-value" class="date-hud__value"></div>
    </aside>

    <script src="./vendor/ink.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
