name: Deploy Ink Story to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Install inklecate
        run: |
          curl -L -o inklecate.zip https://github.com/inkle/ink/releases/latest/download/inklecate_linux.zip
          unzip inklecate.zip -d inklecate-bin
          chmod +x inklecate-bin/inklecate
          echo "$PWD/inklecate-bin" >> "$GITHUB_PATH"

      - name: Build story JSON and web files
        shell: pwsh
        run: ./scripts/build-story.ps1

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
